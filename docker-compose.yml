version: "3.9"
services:
  deep-research:
    build:
      context: .
      dockerfile: Dockerfile
    image: deep-research
    container_name: deep-research
    env_file:
      - .env
    environment:
      MCP_TASK_STORAGE_FILE: /app/data/tasks.json
    ports:
      - "3333:3000"
    volumes:
      - ./data:/app/data
